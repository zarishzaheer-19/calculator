<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,intial-scale=1.0>
      <title> Pink Calculator </title>
      <link rel="stylesheet" href="style.css">
  </head>
  <body class="pink">
    <div class="calculator">
      <div class="top-bar">
      <h2>&#127800 Pink Calculator &#127800</h2>
        <select id="theme" onchange="changeTheme()">
        <option value="pink">Pink</option>
        <option value="purple">Purple</option>
        <option value="blue">Blue</option>
        <option value="mint">Mint</option>
        <option value="dark">Dark</option>
        </select>
      </div>
      <input type="text" id="display" readonly>
      <div class="buttons">
        <button class="special" onclick="clearDisplay()"<span>>C</span></button>
        <button class="special" onclick="deleteLast()"><span>Delete</span></button>
        <button class="special" onclick="appendValue('/')">&divide</button>
        <button class="special" onclick="appendValue('7')">7</button>
        <button class="special" onclick="appendValue('8')">8</button>
        <button class="special" onclick="appendValue('9')">9</button>
        <button class="special" onclick="appendValue('*')">x</button>
        <button class="special" onclick="appendValue('4')">4</button>
        <button class="special" onclick="appendValue('5')">5</button>
        <button class="special" onclick="appendValue('6')">6</button>
        <button class="special" onclick="appendValue('-')">-</button>
        <button class="special" onclick="appendValue('1')">1</button>
        <button class="special" onclick="appendValue('2')">2</button>
        <button class="special" onclick="appendValue('3')">3</button>
         <button class="special" onclick="appendValue('+')">+</button>
         <button class="special" onclick="appendValue('0')">0</button>
         <button class="special" onclick="appendValue('.')">.</button>
         <button class="special" onclick="calculate()">=</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
        
  </body>
