<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,intial-scale=1.0>
      <title> Pink Calculator </title>
      <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="calculator">
      <h2>&#127800 Pink Calculator &#127800</h2>
      <input type="text" id="display" readonly>
      <div class="buttons">
        <button class="special" onclick="clearDisplay()">C</button>
        <button class="special" onclick="deleteLast()">Delete</button>
        <button class="special" onclick="appendValue('/')">&divide</button>
         <button class="special" onclick="appendValue('7')">7</button>
         <button class="special" onclick="appendValue('8')">8</button>
         <button class="special" onclick="appendValue('9')">9</button>
         <button class="special" onclick="appendValue('*')">x</button>
  </body>
