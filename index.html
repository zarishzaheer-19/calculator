<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,intial-scale=1.0>
      <title> Pink Calculator </title>
      <link rel="stylesheet" href="style.css">
  </head>
  <body class="pink">
    <div class="calculator">
      <div class="top-bar">
      <h2>&#127800 Pink Calculator &#127800</h2>
        <select id="theme" onchange="changeTheme()">
        <option value="pink">Pink</option>
        <option value="purple">Purple</option>
        <option value="blue">Blue</option>
        <option value="mint">Mint</option>
        <option value="dark">Dark</option>
        </select>
      </div>
      <input type="text" id="display" readonly>
      <div class="buttons">
        <button class="special" onclick="clearDisplay()"<span>>C</span></button>
        <button class="special" onclick="deleteLast()"><span>Delete</span></button>
        <button class="special" onclick="appendValue('/')"><span>&divide</span></button>
        <button class="special" onclick="appendValue('7')"><span>7</span></button>
        <button class="special" onclick="appendValue('8')"><span>8</span></button>
        <button class="special" onclick="appendValue('9')"><span>9</span></button>
        <button class="special" onclick="appendValue('*')"><span>x</span></button>
        <button class="special" onclick="appendValue('4')"><span>4</span></button>
        <button class="special" onclick="appendValue('5')"><span>5</span>/button>
        <button class="special" onclick="appendValue('6')"><span>6</span></button>
        <button class="special" onclick="appendValue('-')"><span>-</span></button>
        <button class="special" onclick="appendValue('1')"><span>1</span></button>
        <button class="special" onclick="appendValue('2')"><span>2</span></button>
        <button class="special" onclick="appendValue('3')"><span>3</span></button>
         <button class="special" onclick="appendValue('+')"><span>+</span></button>
         <button class="special" onclick="appendValue('0')"><span>0</span></button>
         <button class="special" onclick="appendValue('.')"><span>.</span></button>
         <button class="special" onclick="calculate()"><span>.</span></button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
        
  </body>
